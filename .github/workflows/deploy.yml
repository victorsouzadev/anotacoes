name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx ng build --configuration production

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Empacota backend + frontend + configs de deploy
        run: |
          tar -czf deploy.tar.gz \
            --exclude=backend/bin --exclude=backend/obj \
            --exclude=frontend/node_modules --exclude=frontend/dist --exclude=frontend/.angular \
            backend frontend docker-compose.yml docker-compose.vps.yml caddy

      - name: Envia pacote para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: /opt/notas-vps
          overwrite: true

      - name: Extrai e sobe os containers (build sequencial, mitigando OOM em 1.9 GiB de RAM)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/notas-vps
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            mkdir -p data/db
            docker stop hermes || true
            docker compose -f docker-compose.yml -f docker-compose.vps.yml build api
            docker compose -f docker-compose.yml -f docker-compose.vps.yml build caddy
            docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d
            docker start hermes || true
            docker image prune -f

      - name: Verifica saúde da API
        run: |
          sleep 5
          curl -sf http://${{ secrets.VPS_HOST }}:8090/api/health
